<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/fmteam-icon.png" />
  <link rel="apple-touch-icon" href="/fmteam-icon.png" />
  <!-- Manifest estático (discoverable por PWABuilder/crawlers); o script abaixo
       atualiza o href por rota em runtime. -->
  <link rel="manifest" id="app-manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Acompanhe seu progresso, dieta e evolução" />
  <meta name="theme-color" content="#10b981" />
  <!-- O portal é estilizado em tema claro ("light"). Declarar color-scheme: light
       impede que navegadores com "modo escuro para sites" (ex.: Chrome Android,
       força-escuro) auto-invertam as cores e deixem o app escuro no aparelho do aluno. -->
  <meta name="color-scheme" content="only light" />
  <!-- Aplica o tema (padrão = seguir o sistema) antes do React montar, evitando flash. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('ma-theme');
        var r = document.documentElement;
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        // PADRÃO = "system": sem escolha salva (t vazio) OU t === 'system' → segue o
        // aparelho. 'dark'/'light' são escolhas explícitas que sobrepõem o sistema.
        var dark = t === 'dark' || ((t === 'system' || !t) && prefersDark);
        // Cor de flash alinhada à paleta real: dark = --d-bg (#080f13), claro = branco.
        if (dark) { r.classList.add('dark'); r.style.colorScheme = 'dark'; r.style.backgroundColor = '#080f13'; }
        else { r.classList.add('theme-light'); r.style.colorScheme = 'only light'; r.style.backgroundColor = '#ffffff'; }
      } catch (e) {}
    })();
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Shape" />
  <!-- Manifest gerado dinamicamente para suportar start_url por nutricionista -->
  <script>
    (function () {
      var path = window.location.pathname;
      // Rotas do dono (/, /portal, /portal-fmteam) usam o logo oficial (o mesmo da
      // tela de login); rotas de outros treinadores (/portal-<slug>) seguem com o
      // ícone padrão fmteam-icon.png.
      var isOwner = path === '/' || path === '/portal' || path === '/portal-fmteam';
      var icon512 = isOwner ? '/app-icon-512.png' : '/fmteam-icon.png';
      var icon192 = isOwner ? '/app-icon-192.png' : '/fmteam-icon.png';

      // start_url por nutricionista (mantém o comportamento atual)
      var startUrl = '/portal';
      if (path.startsWith('/portal-')) {
        startUrl = path;
      }
      var manifest = {
        name: 'My Shape',
        short_name: 'My Shape',
        description: 'Acompanhe seu progresso, dieta e evolução',
        start_url: startUrl,
        display: 'standalone',
        background_color: '#ffffff',
        theme_color: '#10b981',
        orientation: 'portrait-primary',
        scope: '/',
        icons: [
          { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any' },
          { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any' }
        ],
        categories: ['health', 'fitness', 'lifestyle'],
        prefer_related_applications: false
      };
      var blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
      var manifestUrl = URL.createObjectURL(blob);
      // Atualiza o link de manifest existente (estático) em vez de criar outro,
      // pra o browser usar sempre o por-rota e o /manifest.json seguir discoverable.
      var link = document.getElementById('app-manifest') || document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestUrl;
      if (!link.parentNode) document.head.appendChild(link);

      // iOS (apple-touch-icon) e favicon: nas rotas do dono, usar o logo oficial.
      if (isOwner) {
        var apple = document.querySelector('link[rel="apple-touch-icon"]');
        if (apple) apple.setAttribute('href', icon512);
        var fav = document.querySelector('link[rel="icon"]');
        if (fav) fav.setAttribute('href', icon512);
      }
    })();
  </script>
  <title>Meu Acompanhamento</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Registrar Service Worker + auto-update SEGURO.
    // Objetivo: a versão nova (ex.: paleta dark atualizada) chegar no aluno sem ele
    // reinstalar. Regra de ouro: só RECARREGA quando o app volta ao foco (reabertura),
    // NUNCA no meio de uma ação — pra não perder nada que ele esteja digitando
    // (check-in, Suporte). Offline e push continuam funcionando (não mexemos no sw.js).
    if ('serviceWorker' in navigator) {
      // Havia um SW controlando a página neste load? Se sim, um controllerchange =
      // atualização → agenda reload. Se não (1ª instalação), não precisa recarregar.
      var swHadController = !!navigator.serviceWorker.controller;
      var swPendingReload = false;
      var swRefreshing = false;

      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (swHadController) swPendingReload = true;
      });

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState !== 'visible') return;
        // Reabriu o app: aplica a atualização pendente (se houver)…
        if (swPendingReload && !swRefreshing) {
          swRefreshing = true;
          window.location.reload();
          return;
        }
        // …e aproveita pra checar se saiu uma versão nova enquanto esteve fora.
        if (navigator.serviceWorker.controller) {
          navigator.serviceWorker.getRegistration().then(function (reg) {
            if (reg) reg.update().catch(function () {});
          });
        }
      });

      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js')
          .then(function (registration) {
            // Checa atualização logo na abertura.
            registration.update().catch(function () {});
          })
          .catch(function (error) {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
</body>

</html>
