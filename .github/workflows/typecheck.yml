name: Type safety

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-refs:
    name: Identificadores nao definidos (ReferenceError guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:refs
